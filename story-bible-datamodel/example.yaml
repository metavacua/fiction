# This file provides a practical example of the SudoWrite Story Bible data model.
# It is populated with data for a fictional story to demonstrate how the model
# would be used in a real-world project.

braindump: |
  A noir detective story set in a city where memories can be extracted and traded.
  The detective, Jax, is a jaded ex-cop who lost a key memory of his own.
  He's hired by a powerful executive to find a stolen memory, but it turns out
  to be his own missing one. The memory reveals a corporate conspiracy he was
  about to expose before his mind was wiped.

genre: "Cyberpunk Noir"

style: |
  Hardboiled and cynical, in the style of Raymond Chandler, but with a futuristic, high-tech lens.
  The prose should be lean and direct, with a strong focus on atmospheric descriptions of the rain-slicked, neon-drenched city.
  Dialogue is sharp and witty. The tone is world-weary and pessimistic.

synopsis: |
  In the rain-drenched metropolis of Aethelburg, Jax, a disgraced private investigator, makes a living tracking down stolen memories for the elite. He is hired by the enigmatic corporate leader, Alistair Finch, to retrieve a priceless memory stolen from his company's vaults. As Jax navigates the city's seedy underbelly of memory brokers and data-ghosts, he discovers the stolen memory is not Finch's, but his own—a traumatic event he was forced to forget. The memory reveals that Finch's corporation, Memoria, built its empire on a technology that causes catastrophic memory loss in the poor, a secret Jax was about to reveal before Finch had his mind wiped. Jax must now fight to expose the truth while being hunted by Memoria's ruthless agents, all while grappling with the man he used to be.

characters:
  - name: "Jax"
    description: "A former Aethelburg PD detective, now a private investigator. In his late 30s, he is cynical and world-weary after having his own memory forcibly extracted. He is skilled at navigating the city's criminal underworld but struggles with a sense of lost identity."
  - name: "Alistair Finch"
    description: "The charming and ruthless CEO of the Memoria corporation. In his 50s, he presents a polished and philanthropic public image, but is secretly a sociopath who will do anything to protect his company's dark secrets."

worldbuilding:
  - name: "Aethelburg"
    description: "A sprawling, perpetually rain-soaked metropolis. The city is a stark contrast of gleaming corporate towers and decaying, neon-lit streets. The trade of memories, both legal and illegal, is the backbone of its economy."
  - name: "Memory Extraction"
    description: "A technology that allows for the recording, viewing, and transfer of memories. The process is invasive and can cause psychological damage. While officially regulated, a black market for stolen and forbidden memories thrives in the city's underbelly."

outline:
  - chapter_number: 1
    title: "A Ghost at the Door"
    summary: "Jax is hired by Alistair Finch to investigate the theft of a high-value memory. Jax takes the case, despite his misgivings about working for a corporate giant."
  - chapter_number: 2
    title: "The Black Market"
    summary: "Jax's investigation leads him to a notorious memory broker in the city's underbelly. He acquires a fragment of the stolen memory, which triggers a disturbing sense of familiarity."
  - chapter_number: 3
    title: "The Revelation"
    summary: "Jax manages to restore the full memory and discovers it is his own. He sees himself uncovering Memoria's conspiracy and being captured by Finch's agents. He now understands the truth and knows he is in grave danger."

scenes:
  - scene_number: 1
    chapter_number: 1
    summary: "Finch visits Jax's dimly lit office. The contrast between Finch's expensive suit and the office's decay is stark. Finch explains the case, emphasizing the memory's importance. Jax agrees to take the job for an exorbitant fee."
