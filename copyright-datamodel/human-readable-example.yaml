    final_text: "Rainwater dripped from antique neon signs, sizzling on the synth-asphalt below. The city smelled of ozone and wet, rusting metal, a stark contrast to the pristine towers above. Shimmering reflections of the monolithic skyscrapers warped and danced in the oily puddles."
