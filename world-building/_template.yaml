# Location Template
# ---
# This file defines the structure for a location's data.
# All location files should follow this format.
# ---

# Basic Information
id: # Unique identifier for the location (e.g., "market-square")
name: # The name of the location (e.g., "The Market Square")
description: # A detailed description of the location.

# Objects
# A list of objects present in the location.
objects:
  - object_id: # A unique identifier for the object (e.g., "fountain")
    name: # The name of the object (e.g., "Stone Fountain")
    description: # A description of the object.
    is_interactive: # (true/false) Whether characters can interact with the object.