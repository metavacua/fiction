# Scene Template
# ---
# This file defines the structure for a scene's data.
# All scene files should follow this format.
# ---

# Basic Information
id: # Unique identifier for the scene (e.g., "opening-scene")
name: # A descriptive name for the scene (e.g., "The Market Square")
location_id: # The 'id' of the location where the scene takes place

# Chronology
# Order of the scene in the story
order: 1

# Characters
# A list of characters present in the scene.
characters_present:
  - character_id: # The 'id' of the character

# Events
# A chronological list of events that occur within the scene.
events:
  - type: # The type of event (e.g., "dialogue", "action", "observation")
    actor_id: # The 'id' of the character performing the action
    target_id: # (Optional) The 'id' of the character or object being acted upon
    description: # A description of the event from an objective point of view.
    dialogue: # (Optional) Any dialogue spoken during the event.